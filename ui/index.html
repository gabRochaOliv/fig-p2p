<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Figurinhas P2P</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Courier New', monospace; background: #0d1117; color: #c9d1d9; padding: 20px; }
        h1 { color: #58a6ff; margin-bottom: 20px; font-size: 1.4em; }
        h2 { color: #8b949e; font-size: 0.9em; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; }
        .card.full { grid-column: 1 / -1; }
        .badge { display: inline-block; background: #21262d; border: 1px solid #30363d; color: #58a6ff; padding: 3px 10px; border-radius: 12px; margin: 3px; font-size: 0.85em; }
        .badge.peer { color: #3fb950; border-color: #3fb950; }
        .search-row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
        input[type=text] { flex: 1; background: #21262d; color: #c9d1d9; border: 1px solid #30363d; padding: 8px 12px; border-radius: 6px; font-family: inherit; font-size: 0.9em; }
        input[type=text]:focus { outline: none; border-color: #58a6ff; }
        button { background: #238636; color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 0.85em; }
        button:hover { background: #2ea043; }
        button.trade-btn { background: #1f6feb; padding: 4px 10px; margin-top: 6px; }
        button.trade-btn:hover { background: #388bfd; }
        button.trade-btn:disabled { background: #30363d; color: #8b949e; cursor: default; }
        .result { border-left: 3px solid #3fb950; padding: 8px 12px; margin: 6px 0; background: #0d1117; border-radius: 0 4px 4px 0; display: flex; align-items: center; gap: 12px; }
        .result-info { flex: 1; }
        .trade-item { border-left: 3px solid #d29922; padding: 8px 12px; margin: 6px 0; background: #0d1117; border-radius: 0 4px 4px 0; font-size: 0.85em; display: flex; align-items: center; gap: 10px; }
        .trade-item.rejected { border-color: #f85149; }
        .muted { color: #8b949e; font-size: 0.8em; }
        code { background: #21262d; padding: 1px 5px; border-radius: 3px; font-size: 0.9em; }
#search-status { font-size: 0.8em; color: #8b949e; margin-top: 4px; min-height: 16px; }
        .empty { color: #8b949e; font-style: italic; font-size: 0.85em; }
        /* Figurinha card no inventário */
        .inv-grid { display: flex; flex-wrap: wrap; gap: 12px; }
        .fig-card { background: #21262d; border: 1px solid #30363d; border-radius: 8px; padding: 12px; text-align: center; width: 130px; }
        .fig-card img { width: 100px; height: 100px; object-fit: contain; border-radius: 4px; display: block; margin: 0 auto 6px; }
        .fig-card .fig-id { font-size: 0.75em; color: #58a6ff; font-weight: bold; }
        .fig-card .fig-qty { font-size: 0.8em; color: #d29922; }
        /* Card de peer conectado */
        .peer-card { background: #21262d; border: 1px solid #3fb950; border-radius: 8px; padding: 10px; text-align: center; width: 110px; }
        .peer-card img { width: 80px; height: 80px; object-fit: contain; border-radius: 4px; display: block; margin: 0 auto 6px; }
        .peer-card .peer-id { font-size: 0.75em; color: #3fb950; font-weight: bold; }
        .peer-card .peer-dot { display: inline-block; width: 7px; height: 7px; background: #3fb950; border-radius: 50%; margin-right: 4px; }
        /* Figurinha no resultado de busca */
        .result img { width: 60px; height: 60px; object-fit: contain; border-radius: 4px; flex-shrink: 0; }
        /* Figurinha no histórico */
        .trade-item img { width: 36px; height: 36px; object-fit: contain; border-radius: 3px; flex-shrink: 0; }
        /* Modal de confirmação de troca */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
        .modal-overlay.open { display: flex; }
        .modal-box { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 24px; min-width: 300px; max-width: 380px; width: 90%; }
        .modal-box h3 { color: #c9d1d9; font-size: 1em; margin-bottom: 16px; }
        .modal-trade-info { display: flex; align-items: center; gap: 16px; background: #0d1117; border-radius: 8px; padding: 12px; margin-bottom: 20px; }
        .modal-trade-info img { width: 64px; height: 64px; object-fit: contain; border-radius: 4px; flex-shrink: 0; }
        .modal-trade-info .modal-detail { font-size: 0.85em; line-height: 1.6; }
        .modal-trade-info .modal-detail strong { color: #58a6ff; font-size: 1em; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
        .modal-actions button { padding: 8px 18px; }
        .modal-cancel { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; }
        .modal-cancel:hover { background: #30363d; }
        .modal-confirm { background: #1f6feb; }
        .modal-confirm:hover { background: #388bfd; }
    </style>
</head>
<body>
    <h1>Figurinhas P2P &mdash; <span id="peer-id">...</span></h1>

    <div class="grid">
        <div class="card">
            <h2>Invent&aacute;rio</h2>
            <div id="inventory"><span class="empty">Carregando...</span></div>
        </div>
        <div class="card">
            <h2>Vizinhos Conectados</h2>
            <div id="peers" style="display:flex;flex-direction:column;gap:10px"><span class="empty">Carregando...</span></div>
            <div id="configured-peers-section" style="margin-top:12px"></div>
            <div class="search-row" style="margin-top:8px">
                <input type="text" id="connect-host" placeholder="" autocomplete="off" />
                <button onclick="doConnect()">Conectar</button>
            </div>
            <div id="connect-status" style="font-size:0.8em;color:#8b949e;margin-top:4px;min-height:16px"></div>
        </div>
    </div>

    <div class="card full" id="offers-card" style="margin-bottom:16px;display:none;border-color:#d29922">
        <h2 style="color:#d29922">Propostas Recebidas</h2>
        <div id="incoming-offers"></div>
    </div>

    <div class="card full" style="margin-bottom:16px">
        <h2>Buscar Figurinha</h2>
        <div class="search-row">
            <input type="text" id="search-input" placeholder="" autocomplete="off" />
            <button onclick="doSearch()">Buscar</button>
        </div>
        <div id="search-status"></div>
        <div id="search-results"><span class="empty">Nenhum resultado ainda</span></div>
    </div>

    <div class="card full">
        <h2>Hist&oacute;rico de Trocas</h2>
        <div id="trade-history"><span class="empty">Nenhuma troca ainda</span></div>
    </div>


    <div class="modal-overlay" id="trade-modal">
        <div class="modal-box">
            <h3>Propor troca</h3>
            <div class="modal-trade-info">
                <img id="modal-img" src="" alt="" onerror="this.style.display='none'">
                <div class="modal-detail">
                    Você quer: <strong id="modal-sid"></strong><br>
                    <span class="muted">disponível em <code id="modal-peer"></code></span>
                </div>
            </div>
            <div style="margin-bottom:16px">
                <label style="font-size:0.85em;color:#8b949e;display:block;margin-bottom:6px">Você oferece em troca:</label>
                <select id="modal-offer-select" style="width:100%;background:#21262d;color:#c9d1d9;border:1px solid #30363d;padding:8px 10px;border-radius:6px;font-family:inherit;font-size:0.9em;cursor:pointer"></select>
            </div>
            <div class="modal-actions">
                <button class="modal-cancel" id="modal-btn-cancel">Cancelar</button>
                <button class="modal-confirm" id="modal-btn-confirm">Enviar proposta</button>
            </div>
        </div>
    </div>

    <script>
        var IMG_BASE = 'https://raw.githubusercontent.com/rgcoelho01/album/main/docs/images/';
        var state = { peer_id: '', inventory: {}, connected_peers: [], search_results: [], trade_history: [] };
        var prevStateJson = '';
        var pendingTrades = new Set();

        // Escapa caracteres especiais para não quebrar o HTML gerado dinamicamente
        function escHtml(s) {
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        // Monta a tag <img> de uma figurinha buscando a imagem no GitHub do professor
        function imgTag(sid, size) {
            var url = IMG_BASE + encodeURIComponent(sid) + '.png';
            return '<img src="' + url + '" alt="' + escHtml(sid) + '" width="' + size + '" height="' + size + '" onerror="this.style.display=\'none\'">';
        }

        // Busca o estado atual do nó via GET /api/state e redesenha a tela se algo mudou
        // Roda automaticamente a cada 2 segundos (ver setInterval no final)
        async function fetchState() {
            try {
                var res = await fetch('/api/state');
                if (!res.ok) throw new Error(res.status);
                var newState = await res.json();
                var newJson = JSON.stringify(newState);
                if (newJson !== prevStateJson) {
                    prevStateJson = newJson;
                    state = newState;
                    render();
                }
            } catch (e) {
            }
        }

        // Redesenha toda a tela com os dados que estão na variável `state`
        // Não faz nenhuma requisição HTTP — só lê o state e monta o HTML
        function render() {
            document.getElementById('peer-id').textContent = state.peer_id || '...';

            var inv = state.inventory || {};
            var invKeys = Object.keys(inv).filter(function(k) { return k && k.trim(); }).sort();
            document.getElementById('inventory').innerHTML = invKeys.length === 0
                ? '<span class="empty">Inventário vazio</span>'
                : '<div class="inv-grid">' + invKeys.map(function(sid) {
                    return '<div class="fig-card">'
                        + imgTag(sid, 70)
                        + '<div class="fig-id">' + escHtml(sid) + '</div>'
                        + '<div class="fig-qty">x' + inv[sid] + '</div>'
                        + '</div>';
                }).join('') + '</div>';

            var peers = state.connected_peers || [];
            var peerInvs = state.peer_inventories || {};
            document.getElementById('peers').innerHTML = peers.length === 0
                ? '<span class="empty">Nenhum vizinho conectado</span>'
                : peers.map(function(p) {
                    var num = p.replace('ALUNO-', '');
                    var figId = 'FIG-' + num;

                    // Figurinhas conhecidas deste peer
                    var peerStickers = (peerInvs[p] || []).slice().sort();
                    var stickersHtml = peerStickers.length === 0
                        ? '<span class="muted" style="font-size:0.75em">Nenhuma figurinha conhecida. Faça uma busca para descobrir.</span>'
                        : '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px">'
                            + peerStickers.map(function(sid) {
                                var jatem = (inv[sid] || 0) > 0;
                                var pkey = sid + '|' + p;
                                var pendente = pendingTrades.has(pkey);
                                var disabled = jatem || pendente ? ' disabled' : '';
                                var btnLabel = jatem ? 'Já possui' : (pendente ? '...' : 'Trocar');
                                var onclick = (jatem || pendente) ? '' : ' onclick="doTrade(\'' + escHtml(p) + '\',\'' + escHtml(sid) + '\')"';
                                var highlight = jatem ? 'border:1px solid #30363d;opacity:0.55' : 'border:1px solid #d29922';
                                return '<div style="background:#0d1117;border-radius:6px;padding:5px;text-align:center;' + highlight + '">'
                                    + imgTag(sid, 44)
                                    + '<div style="font-size:0.7em;color:#58a6ff">' + escHtml(sid) + '</div>'
                                    + (jatem ? '<div style="font-size:0.65em;color:#8b949e">×' + (inv[sid] || 0) + '</div>' : '<div style="font-size:0.65em;color:#d29922">novo!</div>')
                                    + '<button class="trade-btn" style="margin-top:3px;padding:2px 7px;font-size:0.72em"' + disabled + onclick + '>' + btnLabel + '</button>'
                                    + '</div>';
                            }).join('')
                            + '</div>';
                    return '<div class="card" style="margin-bottom:0;border-color:#3fb950">'
                        + '<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">'
                        + imgTag(figId, 36)
                        + '<strong style="color:#3fb950"><span style="display:inline-block;width:7px;height:7px;background:#3fb950;border-radius:50%;margin-right:4px"></span>' + escHtml(p) + '</strong>'
                        + '</div>'
                        + stickersHtml
                        + '</div>';
                }).join('');

            // libera pendingTrades para figurinhas que já estão no inventário (todas as chaves sid|peer)
            pendingTrades.forEach(function(key) {
                var sid = key.split('|')[0];
                if ((inv[sid] || 0) > 0) pendingTrades.delete(key);
            });

            var cfgPeers = state.configured_peers || [];
            var ipMap = state.peer_ip_map || {};
            var cfgSection = document.getElementById('configured-peers-section');
            if (cfgPeers.length === 0) {
                cfgSection.innerHTML = '';
            } else {
                cfgSection.innerHTML = '<div style="font-size:0.75em;color:#8b949e;margin-bottom:5px;text-transform:uppercase;letter-spacing:1px">IPs configurados</div>'
                    + cfgPeers.map(function(p) {
                        var key = p.host + ':' + (p.port || 8080);
                        var peerId = ipMap[key];
                        var connected = peerId && (state.connected_peers || []).indexOf(peerId) !== -1;
                        var statusBadge = connected
                            ? '<span style="font-size:0.72em;color:#3fb950;border:1px solid #3fb950;border-radius:10px;padding:1px 7px">✓ ' + escHtml(peerId) + '</span>'
                            : '<span style="font-size:0.72em;color:#8b949e;border:1px solid #30363d;border-radius:10px;padding:1px 7px">● tentando...</span>';
                        return '<div style="display:flex;align-items:center;justify-content:space-between;background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:5px 10px;margin-bottom:4px">'
                            + '<div style="display:flex;align-items:center;gap:8px">'
                            + '<code style="font-size:0.82em;color:#c9d1d9">' + escHtml(key) + '</code>'
                            + statusBadge
                            + '</div>'
                            + '<button onclick="removePeer(\'' + escHtml(p.host) + '\',' + parseInt(p.port || 8080) + ')" style="background:#b62324;color:#fff;border:none;padding:2px 9px;border-radius:4px;font-size:0.75em;cursor:pointer">Remover</button>'
                            + '</div>';
                    }).join('');
            }

            var offers = state.incoming_offers || [];
            var offersCard = document.getElementById('offers-card');
            offersCard.style.display = offers.length > 0 ? '' : 'none';
            document.getElementById('incoming-offers').innerHTML = offers.map(function(o) {
                var mid = escHtml(o.message_id);
                var peer = escHtml(o.from_peer);
                var they_offer = escHtml(o.offer_sticker_id);
                var they_want = escHtml(o.want_sticker_id);
                return '<div class="result" style="justify-content:space-between;flex-wrap:wrap;gap:8px">'
                    + '<div style="display:flex;align-items:center;gap:12px">'
                    + imgTag(o.offer_sticker_id, 52)
                    + '<div class="result-info">'
                    + '<strong>' + peer + '</strong> quer trocar<br>'
                    + 'oferece <code>' + they_offer + '</code> | quer <code>' + they_want + '</code>'
                    + '</div></div>'
                    + '<div style="display:flex;gap:8px;align-items:center">'
                    + '<button class="trade-btn" style="background:#238636" onclick="decideTrade(\'' + mid + '\',true)">Aceitar</button>'
                    + '<button class="trade-btn" style="background:#b62324" onclick="decideTrade(\'' + mid + '\',false)">Recusar</button>'
                    + '</div>'
                    + '</div>';
            }).join('');

            var results = (state.search_results || []).slice().reverse();
            document.getElementById('search-results').innerHTML = results.length === 0
                ? '<span class="empty">Nenhum resultado ainda</span>'
                : results.map(function(r) {
                    var peer = escHtml(r.from_peer);
                    var sid = escHtml(r.sticker_id);
                    var qid = (r.query_id || '').slice(0, 8);
                    var pkey = r.sticker_id + '|' + r.from_peer;
                    var pendente = pendingTrades.has(pkey);
                    var disabled = pendente ? ' disabled' : '';
                    var label = pendente ? 'Proposta enviada...' : 'Propor Troca';
                    var onclick = pendente ? '' : ' onclick="doTrade(\'' + peer + '\',\'' + sid + '\')"';
                    return '<div class="result">'
                        + imgTag(r.sticker_id, 60)
                        + '<div class="result-info">'
                        + '<strong>' + sid + '</strong> disponível em <code>' + peer + '</code>'
                        + '<br><span class="muted">query: ' + qid + '...</span>'
                        + '<br><button class="trade-btn"' + disabled + onclick + '>' + label + '</button>'
                        + '</div></div>';
                }).join('');

            var trades = (state.trade_history || []).slice().reverse();
            document.getElementById('trade-history').innerHTML = trades.length === 0
                ? '<span class="empty">Nenhuma troca ainda</span>'
                : trades.map(function(t) {
                    var cls = t.status === 'rejeitada' ? ' rejected' : '';
                    var arrow = t.type === 'enviada' ? '&#8599; Enviamos' : '&#8600; Recebemos';
                    return '<div class="trade-item' + cls + '">'
                        + imgTag(t.got, 36)
                        + '<div>'
                        + '<strong>[' + escHtml(t.status).toUpperCase() + ']</strong> '
                        + arrow + ': dei <code>' + escHtml(t.gave) + '</code>'
                        + ' | recebi <code>' + escHtml(t.got) + '</code>'
                        + (t.counterparty ? ' <span class="muted">| ' + escHtml(t.counterparty) + '</span>' : '')
                        + '</div></div>';
                }).join('');
        }

        // Botão "Buscar": pega o texto do input e manda POST /api/search pro node iniciar o flooding
        async function doSearch() {
            var input = document.getElementById('search-input');
            var sticker_id = input.value.trim().toUpperCase();
            if (!sticker_id) return;
            document.getElementById('search-status').textContent = 'Buscando ' + sticker_id + '...';
            try {
                var res = await fetch('/api/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sticker_id: sticker_id })
                });
                var data = await res.json();
                document.getElementById('search-status').textContent = data.ok
                    ? 'Busca iniciada para ' + sticker_id
                    : 'Erro: ' + data.error;
            } catch (e) {
                document.getElementById('search-status').textContent = 'Erro de conexão';
            }
        }

        // Abre o modal de troca e espera o usuário escolher o que vai oferecer
        // Retorna uma Promise que resolve com o sticker_id escolhido, ou null se cancelou
        function showTradeModal(peer, sid) {
            return new Promise(function(resolve) {
                var modal = document.getElementById('trade-modal');
                document.getElementById('modal-sid').textContent = sid;
                document.getElementById('modal-peer').textContent = peer;
                var img = document.getElementById('modal-img');
                img.src = IMG_BASE + encodeURIComponent(sid) + '.png';
                img.style.display = '';

                // Popula o select com figurinhas do inventário (qty > 0)
                var sel = document.getElementById('modal-offer-select');
                sel.innerHTML = '';
                var inv = state.inventory || {};
                var ownSid = state.peer_id ? 'FIG-' + state.peer_id.replace('ALUNO-', '') : 'FIG-09';
                Object.keys(inv).filter(function(k) { return k && inv[k] > 0; }).sort().forEach(function(k) {
                    var opt = document.createElement('option');
                    opt.value = k;
                    opt.textContent = k + '  (×' + inv[k] + ')';
                    if (k === ownSid) opt.selected = true;
                    sel.appendChild(opt);
                });
                if (sel.options.length === 0) {
                    var opt = document.createElement('option');
                    opt.value = '';
                    opt.textContent = 'Inventário vazio';
                    sel.appendChild(opt);
                }

                modal.classList.add('open');
                function close(result) {
                    modal.classList.remove('open');
                    document.getElementById('modal-btn-confirm').removeEventListener('click', onConfirm);
                    document.getElementById('modal-btn-cancel').removeEventListener('click', onCancel);
                    modal.removeEventListener('click', onOverlay);
                    resolve(result);
                }
                function onConfirm() {
                    var chosen = document.getElementById('modal-offer-select').value;
                    close(chosen || null);
                }
                function onCancel() { close(null); }
                function onOverlay(e) { if (e.target === modal) close(null); }
                document.getElementById('modal-btn-confirm').addEventListener('click', onConfirm);
                document.getElementById('modal-btn-cancel').addEventListener('click', onCancel);
                modal.addEventListener('click', onOverlay);
            });
        }

        // Botão "Propor Troca": abre o modal, e se confirmar manda POST /api/trade pro node enviar o TRADE_OFFER
        async function doTrade(target_peer_id, want_sticker_id) {
            var offerSid = await showTradeModal(target_peer_id, want_sticker_id);
            if (!offerSid) return;
            var pkey = want_sticker_id + '|' + target_peer_id;
            pendingTrades.add(pkey);
            render();
            try {
                var res = await fetch('/api/trade', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ target_peer_id: target_peer_id, want_sticker_id: want_sticker_id, offer_sticker_id: offerSid })
                });
                var data = await res.json();
                if (data.ok) {
                    document.getElementById('search-status').textContent = 'Proposta enviada para ' + target_peer_id + ' — aguardando resposta';
                } else {
                    pendingTrades.delete(pkey);
                    render();
                    alert('Erro: ' + data.error);
                }
            } catch (e) {
                pendingTrades.delete(pkey);
                render();
                alert('Erro de conexão');
            }
        }

        // Botões "Aceitar" / "Recusar" nas propostas recebidas: manda POST /api/trade/accept ou /reject
        async function decideTrade(message_id, accept) {
            var url = accept ? '/api/trade/accept' : '/api/trade/reject';
            try {
                await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message_id: message_id })
                });
                await fetchState();
            } catch (e) {
                alert('Erro de conexao');
            }
        }

        // Botão "Remover" nos IPs configurados: tira o peer do peers.json via POST /api/peers/remove
        async function removePeer(host, port) {
            try {
                await fetch('/api/peers/remove', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ host: host, port: port })
                });
                await fetchState();
            } catch (e) {
                alert('Erro ao remover peer');
            }
        }

        // Botão "Conectar": pega o IP digitado e manda POST /api/connect pro node abrir WebSocket com esse peer
        async function doConnect() {
            var input = document.getElementById('connect-host');
            var raw = input.value.trim();
            if (!raw) return;
            var host = raw, port = 8080;
            if (raw.includes(':')) {
                var parts = raw.split(':');
                host = parts[0].trim();
                port = parseInt(parts[1]) || 8080;
            }
            document.getElementById('connect-status').textContent = 'Conectando a ' + host + '...';
            try {
                var res = await fetch('/api/connect', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ host: host, port: port })
                });
                var data = await res.json();
                if (data.ok) {
                    document.getElementById('connect-status').textContent = 'Conexao iniciada com ' + host + ':' + port;
                    input.value = '';
                } else {
                    document.getElementById('connect-status').textContent = 'Erro: ' + data.error;
                }
            } catch (e) {
                document.getElementById('connect-status').textContent = 'Erro de conexao';
            }
        }

        document.getElementById('search-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') doSearch();
        });

        document.getElementById('connect-host').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') doConnect();
        });

        fetchState();
        setInterval(fetchState, 2000);
    </script>
</body>
</html>
